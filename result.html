<!DOCTYPE html>
<html>
<head>

<title>Burnout Result</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
}

.container{
width:500px;
margin:auto;
margin-top:80px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
color:#2c7be5;
}

ul{
text-align:left;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Burnout Analysis Result</h2>

<p><b>Stress Level:</b> {{stress}}</p>

<p><b>Burnout Risk:</b> {{risk}}%</p>

<p><b>Trend:</b> {{trend}}</p>

<p><b>Final Status:</b> {{status}}</p>

<p><b>Screen Time:</b> {{screen_time}} minutes</p>

<h3>Suggestions</h3>

<ul>

{% for s in suggestions %}
<li>{{s}}</li>
{% endfor %}

</ul>

<br>

<a href="/">
<button>Check Again</button>
</a>

</div>

</body>
</html>
