<!DOCTYPE html>
<html>
<head>
<title>Burnout Detection System</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
}

.container{
width:400px;
margin:auto;
margin-top:80px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5fd0;
}

</style>

</head>

<body>

<div class="container">

<h2>Employee Burnout Detection</h2>

<form action="/analyze" method="POST">

<input type="email" name="email" placeholder="Enter Email" required>

<input type="number" name="work" placeholder="Working Hours per Day" required>

<input type="number" name="sleep" placeholder="Sleep Hours per Day" required>

<button type="submit">Analyze Burnout</button>

</form>

<br>

<form action="/scan" method="POST">

<input type="email" name="email" placeholder="Email for Fatigue Scan" required>

<button type="submit">Scan Fatigue (Camera)</button>

</form>

</div>

</body>
</html>
